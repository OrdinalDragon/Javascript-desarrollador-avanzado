<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Introducción a JS Avanzado</title>
  </head>
  <body>

    <main class="container mx-auto">

      <h1 id="titulo-principal" class="text-2xl text-green-600">Introducción a JS Avanzado</h1>
      <hr> <!-- bradlc.vscode-tailwindcss -->
  
      <button id="btn-ir" class="mt-4 bg-blue-600 hover:bg-blue-700 text-white rounded cursor-pointer px-3 py-1">Ir</button>
   
      <h2 id="subtitulo">Esto es un subtítulo</h2>

      <section id="contenedor-principal" class="flex gap-3 flex-wrap">
        <article class="w-50 h-30 bg-indigo-600 text-center text-white">Contenido 1</article>
        <article class="w-50 h-30 bg-yellow-600 text-center text-white">Contenido 2</article>
        <article class="w-50 h-30 bg-indigo-600 text-center text-white">Contenido 3</article>
        <article class="w-50 h-30 bg-indigo-600 text-center text-white">Contenido 4</article>
        <article class="w-50 h-30 bg-indigo-600 text-center text-white">Contenido 5</article>
        <article class="w-50 h-30 bg-indigo-600 text-center text-white">Contenido 6</article>
        <article class="w-50 h-30 bg-indigo-600 text-center text-white">Contenido 7</article>
        <article class="w-50 h-30 bg-indigo-600 text-center text-white">Contenido 8</article>
        <article class="w-50 h-30 bg-indigo-600 text-center text-white">Contenido 9</article>
        <article class="w-50 h-30 bg-indigo-600 text-center text-white">Contenido 10</article>
      </section>

      <form id="formu" class="mt-4 w-100 h-80 mx-auto bg-amber-700 ">
        <div>
          <label for="lbl-nombre">Nombre</label>
          <input type="text" id="lbl-nombre" name="nombre-oficial">
        </div>

        <button class= "rounded-2xl bg-green-500 hover:bg-green-700 px-3 py-2 border cursor-pointer text-white">Enviar</button>
      </form>
      <form id="formularioLuca" class = "max-w-sm mx-auto px-5 py-10 border-style border-2 border-gray-300 rounded-lg p-6 mt-5">
          
          <div class="mb-5">
            <label for="nombre" class="block mb-2.5 text-sm font-medium text-heading">Tu nombre</label>
            <input type="text" id="nombre" class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-lg focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="Juan Pérez" required />
          </div>
          <div class="mb-5">
            <label for="email" class="block mb-2.5 text-sm font-medium text-heading">Tu email</label>
            <input type="email" id="email" class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-lg focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="JP@mail.com" required />
          </div>
          <div class="mb-5">
            <label for="edad" class="block mb-2.5 text-sm font-medium text-heading">Tu edad</label>
            <input type="number" id="edad" class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-lg focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="25" required />
          </div>
          <button type="submit" class= "rounded-2xl bg-green-500 hover:bg-indigo-700 px-3 py-2 border cursor-pointer text-white">Enviar</button>
      </form>
    </main>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
