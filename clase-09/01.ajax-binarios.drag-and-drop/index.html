<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AJAX Binarios - Drag and Drop</title>
  </head>
  <body>
    <h1>AJAX Binarios - Drag and Drop</h1>
    <hr />

    <main class="container mx-auto mt-8">
      <div class="flex items-center justify-center w-full">
        <label
          id="drop-area"
          class="flex flex-col items-center justify-center w-full h-48 border-2 border-dashed rounded-2xl cursor-pointer transition border-gray-300 bg-gray-50 hover:bg-gray-100 hover:border-blue-400 focus-within:border-blue-500 focus-within:ring-blue-200"
        >
          <div
            class="flex flex-col items-center justify-center pt-5 pb-6 text-gray-500"
          >
            <svg
              aria-hidden="true"
              class="w-10 h-10 mb-3 text-gray-400"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M7 16a4 4 0 01-.88-7.903A5.002 5.002 0 0115.9 6H16a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"
              />
            </svg>
            <p class="mb-2 text-sm font-semibold">
              Drag & Drop or <span class="text-blue-600">Click to Upload</span>
            </p>
            <p class="text-xs text-gray-400">PNG, JPG, WEBP</p>
          </div>
          <input type="file" id="input-file" />
        </label>
      </div>
      <img
        src=""
        alt="preview"
        id="preview"
        class="hidden inset-0 object-cover mt-10 w-60 h-60 rounded-2xl"
      />
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
